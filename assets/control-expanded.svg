<svg xmlns="http://www.w3.org/2000/svg" viewBox="-8 -8 254 178" width="254" height="178"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif">
  <!-- Feed Goblin on-screen control — EXPANDED (hover) state, Left channel active.
       Grid + Left/Center/Right labels, rendered from the real extension.
       Pills sized generously so labels never crowd the edges across fonts. -->
  <defs>
    <filter id="s" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
      <feOffset dy="2" result="off"/>
      <feFlood flood-color="#000000" flood-opacity="0.5"/>
      <feComposite in2="off" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- grid, centered above the labels -->
  <g transform="translate(59,0)" filter="url(#s)">
    <rect x="1" y="1" width="118" height="118" rx="16" fill="#2d1b4e"/>
    <rect x="8"  y="8"  width="48" height="48" rx="10" fill="#41d914" stroke="#41d914" stroke-width="3"/>
    <rect x="64" y="8"  width="48" height="48" rx="10" fill="#241640" stroke="#cfc6e8" stroke-width="3"/>
    <rect x="8"  y="64" width="48" height="48" rx="10" fill="#41d914" stroke="#41d914" stroke-width="3"/>
    <rect x="64" y="64" width="48" height="48" rx="10" fill="#241640" stroke="#cfc6e8" stroke-width="3"/>
  </g>
  <!-- Left / Center / Right labels -->
  <g font-size="14" font-weight="600">
    <rect x="0"   y="132" width="66" height="30" rx="6" fill="#41d914"/>
    <text x="33"  y="152" text-anchor="middle" fill="#0c2a06">Left</text>
    <rect x="72"  y="132" width="86" height="30" rx="6" fill="#2d1b4e" fill-opacity="0.82"/>
    <text x="115" y="152" text-anchor="middle" fill="#cfc6e8">Center</text>
    <rect x="164" y="132" width="74" height="30" rx="6" fill="#2d1b4e" fill-opacity="0.82"/>
    <text x="201" y="152" text-anchor="middle" fill="#cfc6e8">Right</text>
  </g>
</svg>
